<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
@media (orientation: portrait) {
  html, body {
    overflow: hidden;
  }
  body {
    transform-origin: top left;
    transform: rotate(90deg) translateY(-100%);
    width: 100vh !important;
    height: 100vw !important;
    position: fixed;
    top: 0; left: 0;
  }
  #rotate-warn { display: none !important; }

<title>Mundo das Capivarinhas</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
body{width:100vw;height:100vh;height:100dvh;overflow:hidden;background:#87ceeb;font-family:'Nunito',sans-serif}
canvas{display:block;width:100%;height:100%}

/* TOP BAR */
#topbar{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:linear-gradient(to bottom,rgba(30,70,10,.72),transparent);pointer-events:none}
.tbtn{pointer-events:all;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.35);border-radius:14px;padding:6px 13px;color:white;font-family:'Fredoka One',cursive;font-size:.88rem;cursor:pointer;backdrop-filter:blur(6px);transition:background .15s}
.tbtn:active{background:rgba(255,255,255,.38)}
#capname-hud{font-family:'Fredoka One',cursive;color:white;font-size:1rem;text-shadow:1px 2px 6px rgba(0,0,0,.55)}

/* STATS BAR */
#statbar{position:fixed;top:50px;left:50%;transform:translateX(-50%);z-index:20;background:rgba(0,0,0,.42);border-radius:18px;padding:6px 13px;display:flex;gap:9px;align-items:center;backdrop-filter:blur(6px)}
.shud{display:flex;align-items:center;gap:4px}
.st{width:55px;height:7px;background:rgba(255,255,255,.22);border-radius:4px;overflow:hidden}
.sf{height:100%;border-radius:4px;transition:width .55s}
.fh{background:linear-gradient(to right,#ff9a44,#ff4400)}
.fj{background:linear-gradient(to right,#ffe040,#f5a800)}
.fc{background:linear-gradient(to right,#72d4f0,#18aadc)}
.fe{background:linear-gradient(to right,#98e86a,#4abc20)}

/* SETTINGS */
#settings{position:fixed;top:52px;left:50%;transform:translateX(-50%);z-index:25;background:rgba(15,8,0,.88);border:1.5px solid rgba(255,255,255,.2);border-radius:18px;padding:16px 20px;display:none;backdrop-filter:blur(10px);min-width:260px}
#settings h4{color:#f5c842;font-family:'Fredoka One',cursive;font-size:1rem;margin-bottom:12px;text-align:center}
.srow{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.srow:last-child{margin-bottom:0}
.srow label{color:rgba(255,255,255,.8);font-size:.72rem;font-weight:800;display:flex;justify-content:space-between}
.srow label span{color:#f5c842}
.srow input[type=range]{width:100%;accent-color:#f5c842}
.sclose{background:#f5c842;color:#5a3e00;border:none;border-radius:9px;padding:6px 18px;font-family:'Fredoka One',cursive;font-size:.88rem;cursor:pointer;width:100%;margin-top:4px}

/* JUMP POSITION GRID */
.jpos-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:5px;margin-top:4px}
.jpos-btn{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);border-radius:8px;padding:6px 0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.jpos-btn:active{background:rgba(255,255,255,.28)}
.jpos-btn.sel{background:rgba(245,200,66,.35);border-color:#f5c842}
.jpos-btn svg{width:16px;height:16px}

/* JUMP BUTTON */
#btn-jump{position:fixed;right:18px;bottom:110px;z-index:25;width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.95);border:none;box-shadow:0 3px 14px rgba(0,0,0,.32);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:box-shadow .2s;pointer-events:all;touch-action:none}
#btn-jump.dragging{box-shadow:0 0 0 4px #f5c842,0 8px 24px rgba(0,0,0,.5);background:rgba(255,248,190,.98);transform:scale(1.14)}
#btn-jump:not(.dragging):active{transform:scale(.84)}
#btn-jump svg{width:30px;height:30px}
#btn-jump span{font-size:.62rem;font-weight:900;color:#5a3e00}

/* JOYSTICK */
#joy-base{position:fixed;z-index:20;width:115px;height:115px;border-radius:50%;background:rgba(255,255,255,.15);border:2.5px solid rgba(255,255,255,.35);display:none;transform:translate(-50%,-50%);pointer-events:none}
#joy-knob{position:absolute;width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.62);top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 2px 10px rgba(0,0,0,.3)}

/* ACTION BAR */
#actbar{position:fixed;bottom:0;left:0;right:0;z-index:20;padding:10px 12px 20px;display:flex;justify-content:center;gap:9px;background:linear-gradient(to top,rgba(10,5,0,.65),transparent);pointer-events:none}
.abtn{pointer-events:all;display:flex;flex-direction:column;align-items:center;gap:3px;background:rgba(255,255,255,.92);border:none;border-radius:13px;padding:8px 10px;cursor:pointer;min-width:54px;transition:transform .1s;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.abtn:active{transform:scale(.85)}
.abtn svg{width:26px;height:26px}
.abtn span{font-size:.6rem;font-weight:900;color:#5a3e00;white-space:nowrap}

/* FOOD MODAL */
#fov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:none;align-items:flex-end;justify-content:center}
#fov.on{display:flex}
#fsheet{background:linear-gradient(to bottom,#f5e8c8,#ffd98a);border-top:3px solid #c8900a;border-radius:20px 20px 0 0;padding:16px 13px 28px;width:100%;max-width:480px}
#fsheet h3{font-family:'Fredoka One',cursive;font-size:1rem;color:#6B4A00;text-align:center;margin-bottom:12px}
.fgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
.bfood{display:flex;flex-direction:column;align-items:center;gap:3px;background:white;border:2px solid #e0c050;border-radius:12px;padding:8px 3px;cursor:pointer;transition:transform .1s}
.bfood:active{transform:scale(.86)}
.bfood svg{width:30px;height:30px}
.bfood span{font-size:.58rem;font-weight:900;color:#6B4A00}

/* TOAST */
#toast{position:fixed;top:100px;left:50%;transform:translateX(-50%) translateY(-10px);background:rgba(15,8,0,.85);color:white;border-radius:16px;padding:7px 16px;font-size:.78rem;font-weight:800;z-index:100;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ZZZ */
#zzz{position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);z-index:15;pointer-events:none;display:none;animation:zfloat 2.4s ease-in-out infinite}
#zzz.on{display:block}
@keyframes zfloat{0%,100%{transform:translate(-50%,-50%) translateY(0)}50%{transform:translate(-50%,-50%) translateY(-12px)}}

/* BILLBOARD MODAL */
#bbov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:60;display:none;align-items:center;justify-content:center}
#bbov.on{display:flex}
#bbcard{background:linear-gradient(to bottom,#f5e8c8,#ffd98a);border:3px solid #c8900a;border-radius:18px;padding:18px 16px;width:320px;max-height:90vh;overflow-y:auto}
#bbcard h3{font-family:'Fredoka One',cursive;color:#5a3e00;font-size:1.05rem;text-align:center;margin-bottom:12px}
.bbrow{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.bbrow label{font-size:.72rem;font-weight:800;color:#7a5020}
.bbrow input,.bbrow textarea{border:2px solid #c8900a;border-radius:8px;padding:7px 9px;font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:700;color:#5a3e00;background:white;outline:none;width:100%}
.bbrow textarea{resize:vertical;min-height:100px;line-height:1.5}
.bbrow input[type=range]{border:none;background:none;padding:0}
.bbbtns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:4px}
.bplay{background:#5aaa52;color:white;border:none;border-radius:9px;padding:8px 16px;font-family:'Fredoka One',cursive;font-size:.9rem;cursor:pointer}
.bstop{background:#e03030;color:white;border:none;border-radius:9px;padding:8px 16px;font-family:'Fredoka One',cursive;font-size:.9rem;cursor:pointer}
.bbbclose{background:#e0c050;color:#5a3e00;border:none;border-radius:9px;padding:8px 16px;font-family:'Fredoka One',cursive;font-size:.9rem;cursor:pointer}
.bplay:active,.bstop:active,.bbbclose:active{opacity:.75}

/* NAME TAGS */
#nametags{position:fixed;inset:0;pointer-events:none;z-index:15}
.ntag{position:absolute;transform:translate(-50%,-100%);background:rgba(255,255,255,.93);border-radius:9px;padding:2px 9px;font-family:'Fredoka One',cursive;font-size:.72rem;color:#5a3e00;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.22);pointer-events:none;transition:opacity .2s}

/* REMOVE MODAL */
#rmov{position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:60;display:none;align-items:center;justify-content:center}
#rmov.on{display:flex}
#rmcard{background:#fffae0;border:3px solid #c8900a;border-radius:18px;padding:20px 18px;width:270px;text-align:center}
#rmcard h3{font-family:'Fredoka One',cursive;color:#6B4A00;font-size:1rem;margin-bottom:6px}
#rmcard p{font-size:.78rem;color:#8a6020;font-weight:700;margin-bottom:14px}
.rmbtns{display:flex;gap:9px;justify-content:center}
.bremove{background:#e03030;color:white;border:none;border-radius:9px;padding:8px 18px;font-family:'Fredoka One',cursive;font-size:.9rem;cursor:pointer}
.bcancel{background:#e0c050;color:#5a3e00;border:none;border-radius:9px;padding:8px 18px;font-family:'Fredoka One',cursive;font-size:.9rem;cursor:pointer}
.bremove:active,.bcancel:active{opacity:.75}

/* CAP SWITCHER */
#cap-switcher{position:fixed;right:12px;top:50%;transform:translateY(-50%);z-index:20;display:flex;flex-direction:column;gap:7px;align-items:center}
.cap-sw-btn{background:rgba(0,0,0,.45);border:2px solid rgba(255,255,255,.3);border-radius:50%;width:44px;height:44px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;backdrop-filter:blur(5px);transition:border-color .15s,transform .12s;padding:0}
.cap-sw-btn.active{border-color:#f5c842;background:rgba(245,200,66,.22)}
.cap-sw-btn:active{transform:scale(.88)}
.cap-sw-dot{width:10px;height:10px;border-radius:50%;background:#c8a86a;border:1.5px solid rgba(255,255,255,.6)}
.cap-sw-label{font-size:.5rem;font-weight:900;color:white;max-width:38px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;line-height:1}

/* MINIMAP */
#minimap{position:fixed;top:50px;right:14px;z-index:20;width:88px;height:88px;background:rgba(0,0,0,.45);border-radius:12px;border:1.5px solid rgba(255,255,255,.25);overflow:hidden;backdrop-filter:blur(4px)}
#minimap canvas{width:100%;height:100%}

/* LANDSCAPE */
@media (orientation: landscape) {
  #statbar{top:44px;padding:4px 10px;gap:7px}
  .st{width:44px;height:6px}
  #actbar{padding:7px 12px 10px;gap:7px}
  .abtn{padding:6px 8px;min-width:48px}
  .abtn svg{width:22px;height:22px}
  .abtn span{font-size:.58rem}
  #cap-switcher{right:10px}
  .cap-sw-btn{width:38px;height:38px}
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="btn-musica" onclick="toggleMusica()" style="position:fixed;bottom:160px;right:18px;display:none;z-index:25;background:rgba(0,0,0,.8);color:white;border:2px solid white;border-radius:14px;padding:10px 16px;font-family:'Fredoka One',cursive;font-size:.9rem;cursor:pointer;">APERTA AQUI</button>

<!-- ROTATE WARNING -->
<div id="rotate-warn">
  <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
    <rect x="16" y="8" width="32" height="48" rx="5" stroke="#f5c842" stroke-width="3"/>
    <circle cx="32" cy="50" r="3" fill="#f5c842"/>
    <path d="M26 28 L32 22 L38 28" stroke="#f5c842" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

        <path d="M10 1v2M10 17v2M1 10h2M17 10h2M3.5 3.5l1.4 1.4M15.1 15.1l1.4 1.4M3.5 16.5l1.4-1.4M15.1 4.9l1.4-1.4" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      Config

</div>

<!-- SETTINGS PANEL -->
<div id="settings">
  <h4>Configurações</h4>
  <div class="srow">

<!-- STATS HUD -->
<div id="statbar">

    <div class="st"><div class="sf fh" id="hH"></div></div>
  </div>
  <div class="shud">
    <svg width="13" height="13" viewBox="0 0 14 14"><path d="M7 12.5L2 7Q0.5 2.5 4.5 2.5Q6.5 2.5 7 4.5Q7.5 2.5 9.5 2.5Q13.5 2.5 12 7Z" fill="#f5b800"/></svg>
    <div class="st"><div class="sf fj" id="hJ"></div></div>
  </div>
  <div class="shud">
    <svg width="13" height="13" viewBox="0 0 14 14"><path d="M7 1.5Q11 7 11 9.5Q11 13 7 13Q3 13 3 9.5Q3 7 7 1.5Z" fill="#1aadde"/></svg>
    <div class="st"><div class="sf fc" id="hC"></div></div>
  </div>
  <div class="shud">
    <svg width="13" height="13" viewBox="0 0 14 14"><path d="M9 1L5 7.5H7.5L6 13L11 7.5H8.5Z" fill="#4dbc22"/></svg>
    <div class="st"><div class="sf fe" id="hE"></div></div>
  </div>
</div>

<!-- JUMP BUTTON -->
<button id="btn-jump" ontouchstart="doJump()" onclick="doJump()">
  <svg viewBox="0 0 34 34" fill="none">
    <ellipse cx="17" cy="31" rx="7" ry="2.5" fill="rgba(0,0,0,.15)"/>
    <path d="M17 27 Q11 21 11 14 Q11 7 17 5 Q23 7 23 14 Q23 21 17 27Z" fill="#f5c842"/>
    <path d="M12 11 L17 3 L22 11" fill="#f5c842" stroke="#d4a000" stroke-width="1.2" stroke-linejoin="round"/>

<!-- JOYSTICK -->
<div id="joy-base"><div id="joy-knob"></div></div>

    <span>Banho</span>
  </button>
  <button class="abtn" onclick="doAct('play')">

    <span>Brincar</span>
  </button>
  <button class="abtn" onclick="doAct('sleep')">
    <svg viewBox="0 0 34 34" fill="none"><path d="M22 4Q13 7 10 16Q7 25 15 31Q7 31 4 23Q1 14 9 7Q16 0 22 4Z" fill="#f9e040"/><circle cx="19" cy="10" r="2" fill="#f5b800" opacity=".6"/></svg>

  </button>
  <button class="abtn" onclick="doAct('pet')">

</div>

<!-- CAP SWITCHER -->
<div id="cap-switcher"></div>

<!-- NAME TAGS -->

    <text x="14" y="34" font-family="Fredoka One" font-size="21" fill="white" opacity=".85">z</text>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ── SAVE / LOAD ─────────────────────────────────────────────────────────────
const SAVE_KEY = 'capivarinhas_v4';
function loadCaps() {
  try {
    const d = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (d && d.length) return d;
  } catch(e){}
  return [{ id:1, name:'Capivona', isAdult:true, color:'#c8a86a', hunger:80, joy:80, clean:80, energy:80, state:'idle', x:30 }];
}
function saveCaps() { localStorage.setItem(SAVE_KEY, JSON.stringify(caps)); }

let caps = loadCaps();
let activeCap = caps[0];

function updateHUD() {
  document.getElementById('capname-hud').textContent = activeCap.name;
  document.getElementById('hH').style.width = activeCap.hunger + '%';
  document.getElementById('hJ').style.width = activeCap.joy + '%';
  document.getElementById('hC').style.width = activeCap.clean + '%';
  document.getElementById('hE').style.width = activeCap.energy + '%';
  document.getElementById('zzz').classList.toggle('on', capState === 'sleeping');
}

function shadeHex(hex, amt) {
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,Math.max(0,r+amt)); g=Math.min(255,Math.max(0,g+amt)); b=Math.min(255,Math.max(0,b+amt));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}
function box(w,h,d,mat,x,y,z,parent) {

}

  for (let i=0;i<pos.count;i++) {
    pos.setX(i, pos.getX(i)*(0.75+Math.random()*.5));

  }

  const m = new THREE.Mesh(geo, Math.random()>.4?M.rock:M.rockD);
  m.position.set(x, sc*.22, z);

  for (const word of words) {

      bbCtx.fillText(line, x, y);

      y += 38;

      bbCtx.fillText(line, x, y);
      line = word + ' ';
      y += 38;
    } else {

// ── CONTROLS ─────────────────────────────────────────────────────────────────
let sensitivity = parseFloat(localStorage.getItem('sensitivity')) || 1.0;
let camYaw = Math.PI;
let camPitch = 0.38;
const CAM_DIST = 5;
const JOY_R = 48;

// ── PORTRAIT AUTO-ROTATE COORDINATE REMAP ────────────────────────────────────
// When CSS rotates body 90deg in portrait, touch coords are still portrait.
// We remap them to match the rotated landscape space.
function remap(t) {
  if (window.innerWidth >= window.innerHeight) {
    // Already landscape — no remap needed
    return { clientX: t.clientX, clientY: t.clientY };
  }
  // Portrait: screen W < H. Body is rotated 90deg clockwise.
  // Portrait touch (tx, ty) → Landscape (ty, W - tx)
  const W = window.innerWidth;
  return { clientX: t.clientY, clientY: W - t.clientX };
}

let joyActive=false, joyTouchId=null, joyX=0, joyY=0, joyBX=0, joyBY=0;
let camTouchId=null, camLX=0, camLY=0;

function onTStart(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const r = remap(t);
    // In portrait-rotated mode, landscape width = innerHeight
    const LW = window.innerWidth >= window.innerHeight ? window.innerWidth : window.innerHeight;
    if (r.clientX < LW*0.45 && !joyActive) {
      joyActive=true; joyTouchId=t.identifier;
      joyBX=r.clientX; joyBY=r.clientY; joyX=0; joyY=0;
      const b=document.getElementById('joy-base');
      b.style.display='block'; b.style.left=r.clientX+'px'; b.style.top=r.clientY+'px';
    } else if (r.clientX>=LW*0.45 && !camTouchId) {
      camTouchId=t.identifier; camLX=r.clientX; camLY=r.clientY;
    }
  }
}
function onTMove(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const r = remap(t);
    if (t.identifier===joyTouchId) {
      const dx=r.clientX-joyBX, dy=r.clientY-joyBY;
      const dist=Math.sqrt(dx*dx+dy*dy), clamped=Math.min(dist,JOY_R);
      const a=Math.atan2(dy,dx), norm=dist>0?clamped/dist:0;
      joyX=Math.cos(a)*norm; joyY=Math.sin(a)*norm;
      const k=document.getElementById('joy-knob');
      k.style.transform=`translate(calc(-50% + ${joyX*JOY_R}px), calc(-50% + ${joyY*JOY_R}px))`;
    } else if (t.identifier===camTouchId) {
      camYaw  -= (r.clientX-camLX)*0.007*sensitivity;
      camPitch += (r.clientY-camLY)*0.006*sensitivity;
      camPitch=Math.max(-Math.PI/2,Math.min(1.55,camPitch));
      camLX=r.clientX; camLY=r.clientY;
    }
  }
}
function onTEnd(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier===joyTouchId) {
      joyActive=false; joyTouchId=null; joyX=0; joyY=0;
      document.getElementById('joy-base').style.display='none';
      document.getElementById('joy-knob').style.transform='translate(-50%,-50%)';
    } else if (t.identifier===camTouchId) camTouchId=null;
  }
}
canvas.addEventListener('touchstart',onTStart,{passive:false});
canvas.addEventListener('touchmove',onTMove,{passive:false});
canvas.addEventListener('touchend',onTEnd,{passive:false});
canvas.addEventListener('touchcancel',onTEnd,{passive:false});

// ── JUMP BUTTON DRAG ──────────────────────────────────────────────────────────
(function(){
  const btn = document.getElementById('btn-jump');
  let dragging = false;
  let touchId = null;
  let btnX = 0, btnY = 0;   // current btn position in landscape coords
  let startRX = 0, startRY = 0; // remap'd touch position when drag started

  function readPos() {
    btnX = parseInt(btn.style.left) || 0;
    btnY = parseInt(btn.style.top)  || 0;
  }

  btn.addEventListener('touchstart', function(e){
    e.stopPropagation();
    const t = e.changedTouches[0];
    const r = remap(t);
    touchId = t.identifier;
    readPos();
    startRX = r.clientX;
    startRY = r.clientY;
    dragging = false;
  }, {passive: true});

  document.addEventListener('touchmove', function(e){
    if (touchId === null) return;
    let touch = null;
    for (let i = 0; i < e.changedTouches.length; i++){
      if (e.changedTouches[i].identifier === touchId){ touch = e.changedTouches[i]; break; }
    }
    if (!touch) return;
    const r = remap(touch);
    const dx = r.clientX - startRX;
    const dy = r.clientY - startRY;
    if (!dragging && Math.sqrt(dx*dx+dy*dy) > 8) {
      dragging = true;
      btn.classList.add('dragging');
    }
    if (dragging){
      e.preventDefault();
      const LW = window.innerWidth >= window.innerHeight ? window.innerWidth : window.innerHeight;
      const LH = window.innerWidth >= window.innerHeight ? window.innerHeight : window.innerWidth;
      const nx = Math.max(0, Math.min(LW - 72, btnX + dx));
      const ny = Math.max(0, Math.min(LH - 72, btnY + dy));
      btn.style.left = nx + 'px';
      btn.style.top  = ny + 'px';
    }
  }, {passive: false});

  document.addEventListener('touchend', function(e){
    let found = false;
    for (let i = 0; i < e.changedTouches.length; i++){
      if (e.changedTouches[i].identifier === touchId){ found = true; break; }
    }
    if (!found) return;
    if (dragging){
      btn.classList.remove('dragging');
      localStorage.setItem('jumpBtnPos', JSON.stringify({
        left: parseInt(btn.style.left),
        top:  parseInt(btn.style.top)
      }));
    } else {
      doJump();
    }
    dragging = false;
    touchId = null;
  }, {passive: true});

  // Restore saved position, or default to bottom-left
  try {
    const s = JSON.parse(localStorage.getItem('jumpBtnPos'));
    if (s && s.left != null){
      btn.style.right  = 'auto';
      btn.style.bottom = 'auto';
      btn.style.left   = s.left + 'px';
      btn.style.top    = s.top  + 'px';
    } else {
      setTimeout(resetJumpPos, 100); // wait for layout
    }
  } catch(e){ setTimeout(resetJumpPos, 100); }
})();

let jumpVel=0, isJumping=false;
const GRAVITY=28;
function doJump(){
  if(isJumping||capState==='sleeping'||capState==='eating') return;
  jumpVel=8.5;
  isJumping=true;
  if(capState!=='playing') spawnFX('play');
}
function updateJump(dt){
  if(!isJumping) return;
  jumpVel-=GRAVITY*dt;
  playerCap.position.y+=jumpVel*dt;
  if(playerCap.position.y<=0){
    playerCap.position.y=0;
    jumpVel=0;
    isJumping=false;
  }
}

const ntContainer = document.getElementById('nametags');
const ntags = []; // {el, mesh, capData}
const _ntVec = new THREE.Vector3();

function createNTag(mesh, capData) {
  const el = document.createElement('div');
  el.className = 'ntag';
  el.textContent = capData.name;
  ntContainer.appendChild(el);
  ntags.push({el, mesh, capData});
  return el;
}

function updateNTags() {
  // Always use landscape dimensions regardless of physical orientation
  const W = window.innerWidth >= window.innerHeight ? window.innerWidth : window.innerHeight;
  const H = window.innerWidth >= window.innerHeight ? window.innerHeight : window.innerWidth;
  ntags.forEach(nt => {
    _ntVec.set(
      nt.mesh.position.x,
      nt.mesh.position.y + (nt.capData.isAdult ? 2.2 : 1.7),
      nt.mesh.position.z
    );
    _ntVec.project(camera);
    const x = (_ntVec.x * 0.5 + 0.5) * W;
    const y = (-_ntVec.y * 0.5 + 0.5) * H;
    if (_ntVec.z > 1) { nt.el.style.opacity = '0'; return; }
    const dist = nt.mesh.position.distanceTo(camera.position);
    nt.el.style.opacity = dist > 28 ? '0' : dist > 20 ? String(1 - (dist-20)/8) : '1';
    nt.el.style.left = x + 'px';
    nt.el.style.top  = y + 'px';
    nt.el.textContent = nt.capData.name;
  });
}

function rebuildNTags() {
  ntags.forEach(nt => nt.el.remove());
  ntags.length = 0;
  createNTag(playerCap, activeCap);
  npcList.forEach((npc, i) => {
    const c = caps[i + 1];
    if (c) createNTag(npc, c);
  });
}

let removeIdx = -1;
function openRemove(idx) {
  if (caps.length <= 1) { showToast('Precisa ter pelo menos 1 capivara!'); return; }
  removeIdx = idx;
  document.getElementById('rmp').textContent = 'Remover "' + caps[idx].name + '"?';
  document.getElementById('rmov').classList.add('on');
}
function closeRemove() {
  document.getElementById('rmov').classList.remove('on');
  removeIdx = -1;
}
function confirmRemove() {
  if (removeIdx < 0 || removeIdx >= caps.length) return;
  if (removeIdx === 0) switchToCap(1); // switch away before removing
  const npcIdx = caps.indexOf(caps[removeIdx]) - 1;
  // removeIdx may have changed after switchToCap, recalculate
  const realNpcIdx = removeIdx - 1;
  if (realNpcIdx >= 0 && realNpcIdx < npcList.length) {
    scene.remove(npcList[realNpcIdx]);
    npcList.splice(realNpcIdx, 1);
  }
  caps.splice(removeIdx, 1);
  if (!caps.find(c => c.id === activeCap.id)) {
    activeCap = caps[0];
    capState = activeCap.state || 'idle';
  }
  saveCaps();
  rebuildNTags();
  buildSwitcher();
  updateHUD();
  closeRemove();
  showToast('Capivara removida!');
}

function buildSwitcher() {
  const sw = document.getElementById('cap-switcher');
  sw.innerHTML = '';
  caps.forEach((c, i) => {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'position:relative;display:flex;flex-direction:column;align-items:center';

    const btn = document.createElement('button');

    dot.style.background = c.color || '#c8a86a';
    dot.style.width = c.isAdult ? '13px' : '9px';
    dot.style.height = c.isAdult ? '13px' : '9px';

    lbl.className = 'cap-sw-label';
    lbl.textContent = c.name;
    btn.appendChild(dot); btn.appendChild(lbl);
    btn.onclick = () => switchToCap(i);

    // Remove button (x) — small, top-right of circle
    const xbtn = document.createElement('button');
    xbtn.style.cssText='position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:#e03030;border:1.5px solid white;color:white;font-size:.6rem;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;padding:0;z-index:5';

function rebuildModel(group, capData) {
  while (group.children.length > 0) group.remove(group.children[0]);
  if (_capTemplate) {
    const clone = _capTemplate.clone(true);
    clone.traverse(c => {
      if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; }
    });
    group.add(clone);
  }
  group.scale.setScalar(capData.isAdult ? 1 : 0.68);
}

function switchToCap(idx) {
  if (idx < 0 || idx >= caps.length) return;
  if (caps[idx].id === activeCap.id) return;
  clearTimeout(_stTimer);

  // npcList[i] corresponds to caps[i+1]
  const npcSlot = idx - 1;
  const npc = npcList[npcSlot];
  if (!npc) return;

  // Swap positions in the world
  const px = playerCap.position.x, pz = playerCap.position.z;
  playerCap.position.set(npc.position.x, 0, npc.position.z);
  npc.position.set(px, 0, pz);

  // Swap data in array so caps[0] is always the active one
  const tmp = caps[0];
  caps[0] = caps[idx];
  caps[idx] = tmp;

  // Rebuild both 3D models with their correct cap data
  rebuildModel(playerCap, caps[0]);
  rebuildModel(npc, caps[idx]);

  activeCap = caps[0];
  capState = activeCap.state || 'idle';

  saveCaps();
  rebuildNTags();
  buildSwitcher();
  updateHUD();
  showToast('Trocou para ' + activeCap.name + '!');
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let _tTimer=null;
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on');
  clearTimeout(_tTimer); _tTimer=setTimeout(()=>t.classList.remove('on'),2400);
}

// ── GAME LOOP ─────────────────────────────────────────────────────────────────
const clock=new THREE.Clock();
let lastDecay=0, lastWander=0, walkTime=0;
const camPos=new THREE.Vector3();
const tmpVec=new THREE.Vector3();

let _lastFrame = 0;
function animate(ts){
  requestAnimationFrame(animate);
  if(ts - _lastFrame < 16.67){ return; }
  _lastFrame = ts;
  const rawDt=clock.getDelta();
  // Use fixed timestep for movement so speed never varies with framerate drops
  const dt=0.016;
  const now=clock.getElapsedTime();

  // ── Player movement ──
  let moving=false;
  if (joyActive && capState!=='sleeping' && capState!=='eating' && capState!=='bathing') {
    // Normalize mag to always be 0 or 1 — no partial slowdown from joystick edge
    const rawMag=Math.sqrt(joyX*joyX+joyY*joyY);
    const mag = rawMag > 0.06 ? 1.0 : 0;
    if (mag > 0) {
      moving=true;
      const spd = capState==='playing' ? 9.5 : 7.2;
      const angle=camYaw+Math.atan2(joyX,joyY);
      let nx=playerCap.position.x+Math.sin(angle)*spd*dt;
      let nz=playerCap.position.z+Math.cos(angle)*spd*dt;
      nx=Math.max(-46,Math.min(46,nx));
      nz=Math.max(-46,Math.min(46,nz));

      // Collisions
let ok=true;
for(const c of colliders){
  if(!isJumping && Math.sqrt((nx-c.x)*(nx-c.x)+(nz-c.z)*(nz-c.z))<c.r+0.4){ok=false;break;}
}
if(ok){playerCap.position.x=nx;playerCap.position.z=nz;}
      playerCap.rotation.y = angle;
    }
  }

  // ── Jump physics ──
  updateJump(dt);

  // Bob / state animations (don't override jump)
  if(isJumping){
    playerCap.rotation.z=0;
  } else if(moving){
    walkTime+=dt*7;
    playerCap.position.y=Math.abs(Math.sin(walkTime))*0.2;
    playerCap.rotation.z=Math.sin(walkTime*0.5)*0.06;
  } else if(capState==='sleeping'){
    playerCap.position.y=0;
    playerCap.rotation.z=Math.sin(now*0.7)*0.14;
  } else if(capState==='playing'){
    playerCap.position.y=Math.abs(Math.sin(now*4.5))*0.5;
    playerCap.rotation.z=0;
  } else if(capState==='bathing'){
    playerCap.position.y=0;
    playerCap.rotation.z=Math.sin(now*14)*0.22;
  } else if(capState==='pet'){
    playerCap.position.y=Math.abs(Math.sin(now*6))*0.22;
  } else {
    playerCap.position.y=Math.sin(now*1.8)*0.06;
    playerCap.rotation.z=0;
    playerCap.rotation.x=0;
  }

  // ── NPCs wander ──
  if(now-lastWander>4){
    lastWander=now;
    npcList.forEach(npc=>{
      npc.userData.tx+=(Math.random()-.5)*10;
      npc.userData.tz+=(Math.random()-.5)*10;
      npc.userData.tx=Math.max(-44,Math.min(44,npc.userData.tx));
      npc.userData.tz=Math.max(-44,Math.min(44,npc.userData.tz));
    });
  }
  npcList.forEach((npc,i)=>{
    const npcCap=caps[i+1];
    if(npcCap) npcCap.hunger=Math.max(0,(npcCap.hunger||80)-0.002);
    if(npcCap && npcCap.hunger<=0) return;
    const dx=npc.userData.tx-npc.position.x, dz=npc.userData.tz-npc.position.z;
    const d=Math.sqrt(dx*dx+dz*dz);
    if(d>0.4){
      const spd=1.6*dt;
      npc.position.x+=dx/d*spd; npc.position.z+=dz/d*spd;
      npc.rotation.y=-Math.atan2(dx,dz);
      npc.position.y=Math.abs(Math.sin(now*3.2+npc.position.x))*0.12;
    } else {
      npc.position.y=Math.sin(now*1.5+npc.position.x)*0.05;
    }
  });

  // ── FX ──
  for(let i=fxList.length-1;i>=0;i--){
    const fo=fxList[i]; fo.life-=dt;
    fo.mesh.position.y+=fo.vy*dt; fo.mesh.position.x+=fo.vx*dt;
    fo.mesh.scale.setScalar(Math.max(0.01,fo.life));
    fo.vy-=0.8*dt; // gravity
    if(fo.life<=0){scene.remove(fo.mesh);fo.mesh.geometry.dispose();fxList.splice(i,1);}
  }

  // ── Stat decay ──
  if(now-lastDecay>3){
    lastDecay=now;
    if(capState==='sleeping'){
      activeCap.energy=Math.min(100,activeCap.energy+14);
      activeCap.hunger=Math.max(0,activeCap.hunger-0.3);
    } else {
      activeCap.hunger=Math.max(0,activeCap.hunger-0.7);
      activeCap.joy=Math.max(0,activeCap.joy-0.5);
      activeCap.clean=Math.max(0,activeCap.clean-0.35);
      activeCap.energy=Math.min(100,activeCap.energy+3); // passive regen always
      if(activeCap.energy<=0&&capState!=='sleeping'){setCapState('sleeping',Infinity);showToast(activeCap.name+' caiu de sono!');}
    }
    updateHUD(); saveCaps();
  }

  // ── Camera ──
  const tx=playerCap.position.x+Math.sin(camYaw)*CAM_DIST*Math.cos(camPitch);
  const ty=playerCap.position.y+1.4+Math.sin(camPitch)*CAM_DIST;
  const tz=playerCap.position.z+Math.cos(camYaw)*CAM_DIST*Math.cos(camPitch);
  camPos.set(tx,Math.max(0.5,ty),tz);
  camera.position.lerp(camPos,0.12);
  camera.lookAt(playerCap.position.x, playerCap.position.y+1.1, playerCap.position.z);

  updateNTags();
  
_updateLrc();
for (let i = _fogos.length - 1; i >= 0; i--) {
  const f = _fogos[i];
  f.userData.life -= 0.016;
  f.position.x += f.userData.vx * 0.06;
  f.position.y += f.userData.vy * 0.06;
  f.userData.vy -= 0.04;
  f.material.opacity = f.userData.life;
  f.material.transparent = true;
  if (f.userData.life <= 0) {
    scene.remove(f);
    _fogos.splice(i, 1);
  }
}
renderer.render(scene,camera);

// Mostrar botão música perto do telão
const _distTelao = Math.sqrt(
  Math.pow(playerCap.position.x - 0, 2) +
  Math.pow(playerCap.position.z - (-43), 2)
);
const _camDirX = Math.sin(camYaw);
const _camDirZ = Math.cos(camYaw);
const _telaoX = 0 - playerCap.position.x;
const _telaoZ = -43 - playerCap.position.z;
const _telaoLen = Math.sqrt(_telaoX*_telaoX + _telaoZ*_telaoZ);
const _dot = (_camDirX*_telaoX + _camDirZ*_telaoZ) / _telaoLen;
const _viradoTelao = _dot < -0.4;
document.getElementById('btn-musica').style.display = (_distTelao < 18 && _viradoTelao) ? 'block' : 'none';
}

// ── INIT ─────────────────────────────────────────────────────────────────────
updateHUD();
buildSwitcher();
rebuildNTags();
document.getElementById('sens').value=sensitivity;
animate();
</script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="screen-orientation" content="landscape">
<style>
@media (orientation: portrait) {
  body {
    transform-origin: top left;
    transform: rotate(90deg) translateX(0) translateY(-100%);
    width: 100vh !important;
    height: 100vw !important;
    overflow: hidden;
    position: fixed;
    top: 0; left: 0;
  }
  html { overflow: hidden; }
}</style>
<title>Capivarinhas 🐾</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bd:#6B4A00;--bm:#8B6914;--gold:#f5c842;--cream:#f5ead0}
body{font-family:'Nunito',sans-serif;height:100vh;height:100dvh;overflow:hidden;display:flex;flex-direction:column;background:#2d5a27;user-select:none}

/* HEADER */
.hdr{background:linear-gradient(135deg,#3a6825,#578636,#3a6825);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 3px 14px rgba(0,0,0,.4);z-index:10}
.hdr-title{font-family:'Fredoka One',cursive;color:#fff;font-size:1.3rem;display:flex;align-items:center;gap:8px;text-shadow:1px 2px 6px rgba(0,0,0,.4)}
.btn-add{background:var(--gold);color:var(--bd);border:none;border-radius:18px;padding:6px 13px;font-family:'Fredoka One',cursive;font-size:.85rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.25);transition:transform .12s;display:flex;align-items:center;gap:5px}
.btn-add:active{transform:scale(.88)}

/* SCENE */
.scene{flex:1;position:relative;overflow:hidden;background:linear-gradient(to bottom,#87ceeb 0%,#b8e0f7 36%,#7bc46f 36%,#5aaa52 56%,#479940 100%)}

/* CAPYBARA */
.cap-wrap{position:absolute;cursor:pointer;bottom:68px;transition:left 2.2s cubic-bezier(.45,.05,.55,.95);z-index:6;transform-origin:bottom center}
.cap-wrap.flipped .cap-svg{transform:scaleX(-1)}
.cap-wrap.sel .cap-svg{filter:drop-shadow(0 0 10px rgba(255,210,30,.98))}
.cap-svg{display:block;transition:filter .3s}
.cap-name-tag{position:absolute;top:-24px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.95);border-radius:9px;padding:2px 9px;font-size:.7rem;font-weight:900;color:var(--bd);white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.18);pointer-events:none}
.cap-alert{position:absolute;top:-4px;right:-4px;width:12px;height:12px;background:#e63030;border-radius:50%;border:2px solid white;animation:blinkit .85s ease-in-out infinite;pointer-events:none;display:none}
.cap-alert.on{display:block}
@keyframes blinkit{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}

/* State animations */
.st-idle .cap-svg{animation:capbob 2.4s ease-in-out infinite}
.st-eating .cap-svg{animation:capchew .35s ease-in-out infinite}
.st-playing .cap-svg{animation:capjump .5s ease-in-out infinite}
.st-bathing .cap-svg{animation:capshake .25s ease-in-out infinite}
.st-sleeping .cap-svg{animation:capsway 3.2s ease-in-out infinite}
.st-happy .cap-svg{animation:capbounce .46s ease-in-out infinite}
.st-pet .cap-svg{animation:capwiggle .4s ease-in-out 3}
@keyframes capbob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes capchew{0%,100%{transform:scaleY(1)}45%{transform:scaleY(.93) translateY(3px)}}
@keyframes capjump{0%,100%{transform:translateY(0) scale(1)}35%{transform:translateY(-26px) scale(.91,1.09)}68%{transform:translateY(-10px) scale(1.05,.96)}}
@keyframes capshake{0%,100%{transform:rotate(0)}25%{transform:rotate(-9deg)}75%{transform:rotate(9deg)}}
@keyframes capsway{0%,100%{transform:rotate(0)}45%{transform:rotate(-7deg)}}
@keyframes capbounce{0%,100%{transform:translateY(0) scale(1)}48%{transform:translateY(-16px) scale(1.05,.96)}}
@keyframes capwiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-12deg)}75%{transform:rotate(12deg)}}

/* Float FX */
.float-fx{position:absolute;pointer-events:none;animation:floatUp 1.8s ease-out forwards;z-index:40}
@keyframes floatUp{0%{transform:translateY(0) scale(.6);opacity:1}100%{transform:translateY(-68px) scale(1.1);opacity:0}}
.zzz{position:absolute;pointer-events:none;top:-28px;right:-5px;animation:zfloat 2.8s ease-in-out infinite}
@keyframes zfloat{0%{opacity:0;transform:translate(0,0) scale(.5)}30%{opacity:1}80%{opacity:1}100%{opacity:0;transform:translate(10px,-30px) scale(1.1)}}

/* SCENE DECORATIONS */
.deco{position:absolute;pointer-events:none}
.cloud{animation:driftcloud linear infinite}
@keyframes driftcloud{from{transform:translateX(-220px)}to{transform:translateX(calc(100vw + 240px))}}

/* BOTTOM PANEL */
.panel{background:linear-gradient(to bottom,#f5e8c8,#ffd98a);border-top:3px solid #c8900a;padding:8px 12px 10px;flex-shrink:0;z-index:10;max-height:220px}
.ph{text-align:center;color:#8a6520;font-weight:800;font-size:.85rem;padding:14px 0 12px}
.cap-info{display:flex;gap:9px;align-items:flex-start}
.av{flex-shrink:0;width:62px;height:58px;background:#e8d080;border-radius:12px;border:2px solid #c8900a;display:flex;align-items:center;justify-content:center;overflow:hidden}
.ir{flex:1;min-width:0}
.itop{display:flex;align-items:center;gap:5px;margin-bottom:5px;flex-wrap:wrap}
.inm{font-family:'Fredoka One',cursive;font-size:1rem;color:var(--bd)}
.ipen{background:none;border:none;cursor:pointer;padding:2px;opacity:.5;transition:opacity .2s}
.ipen:hover{opacity:1}
.ibadge{font-size:.65rem;background:var(--bm);color:white;border-radius:7px;padding:1px 7px;font-weight:900}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:2px 6px}
.stat{display:flex;align-items:center;gap:3px}
.si{flex-shrink:0;width:13px;height:13px}
.sl{font-size:.62rem;font-weight:800;color:#6b4c10;width:36px;flex-shrink:0}
.strack{flex:1;height:8px;background:rgba(0,0,0,.13);border-radius:5px;overflow:hidden}
.sfill{height:100%;border-radius:5px;transition:width .55s}
.fh{background:linear-gradient(to right,#ff9a44,#ff4400)}
.fj{background:linear-gradient(to right,#ffe040,#f5a800)}
.fc{background:linear-gradient(to right,#72d4f0,#18aadc)}
.fe{background:linear-gradient(to right,#98e86a,#4abc20)}
.actions{display:flex;gap:7px;margin-top:7px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.actions::-webkit-scrollbar{height:3px}
.actions::-webkit-scrollbar-thumb{background:#c8900a;border-radius:2px}
.btn-act{display:flex;flex-direction:column;align-items:center;gap:3px;background:white;border:2px solid #e0c050;border-radius:12px;padding:6px 9px;cursor:pointer;transition:transform .1s,background .15s;min-width:52px;flex-shrink:0}
.btn-act:hover{background:#fffadf;border-color:#c8900a}
.btn-act:active{transform:scale(.86)}
.btn-act svg{width:24px;height:24px}
.btn-act span{font-size:.6rem;font-weight:900;color:var(--bd);white-space:nowrap}

/* FOOD MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s}
.overlay.on{opacity:1;pointer-events:all}
.sheet{background:linear-gradient(to bottom,#f5e8c8,#ffd98a);border-top:3px solid #c8900a;border-radius:20px 20px 0 0;padding:16px 13px 26px;width:100%;max-width:480px;transform:translateY(100%);transition:transform .26s}
.overlay.on .sheet{transform:translateY(0)}
.sheet h3{font-family:'Fredoka One',cursive;font-size:1rem;color:var(--bd);text-align:center;margin-bottom:12px}
.fgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
.btn-food{display:flex;flex-direction:column;align-items:center;gap:3px;background:white;border:2px solid #e0c050;border-radius:12px;padding:8px 3px;cursor:pointer;transition:transform .1s,background .15s}
.btn-food:active{transform:scale(.86)}
.btn-food svg{width:32px;height:32px}
.btn-food span{font-size:.59rem;font-weight:900;color:var(--bd)}

/* RENAME */
.rov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:60;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s}
.rov.on{opacity:1;pointer-events:all}
.rcard{background:#fffae0;border:3px solid #c8900a;border-radius:18px;padding:20px 16px;width:260px;text-align:center;transform:scale(.8);transition:transform .22s}
.rov.on .rcard{transform:scale(1)}
.rcard h3{font-family:'Fredoka One',cursive;color:var(--bd);font-size:1rem;margin-bottom:10px}
.rinp{width:100%;border:2px solid #c8900a;border-radius:9px;padding:8px 10px;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:700;color:var(--bd);background:white;text-align:center;margin-bottom:11px;outline:none}
.rinp:focus{border-color:#ff8800;box-shadow:0 0 0 3px rgba(255,136,0,.2)}
.rbtns{display:flex;gap:8px;justify-content:center}
.bok{background:#5aaa52;color:white;border:none;border-radius:9px;padding:7px 18px;font-family:'Fredoka One',cursive;font-size:.9rem;cursor:pointer}
.bno{background:#e0c050;color:var(--bd);border:none;border-radius:9px;padding:7px 18px;font-family:'Fredoka One',cursive;font-size:.9rem;cursor:pointer}
.bok:active,.bno:active{opacity:.75}

/* TOAST */
.toast{position:fixed;top:54px;left:50%;transform:translateX(-50%) translateY(-10px);background:rgba(20,10,0,.82);color:white;border-radius:16px;padding:6px 15px;font-size:.78rem;font-weight:800;z-index:100;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* INTRO */
.intro{position:fixed;inset:0;background:linear-gradient(135deg,#3a6825,#5a8a3a);z-index:200;display:flex;align-items:center;justify-content:center;transition:opacity .6s}
.intro.hide{opacity:0;pointer-events:none}
.icard{background:linear-gradient(to bottom,#f5e8c8,#ffd98a);border:3px solid #c8900a;border-radius:22px;padding:28px 22px;text-align:center;max-width:320px;width:90%}
.icard h1{font-family:'Fredoka One',cursive;color:var(--bd);font-size:1.7rem;margin-bottom:4px}
.icard p{color:#7a5a10;font-size:.82rem;font-weight:700;line-height:1.5;margin-bottom:16px}
.ibtn{background:var(--gold);color:var(--bd);border:none;border-radius:16px;padding:11px 28px;font-family:'Fredoka One',cursive;font-size:1.1rem;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.22);transition:transform .12s}
.ibtn:active{transform:scale(.92)}

/* LANDSCAPE */
@media (orientation: landscape) {
  .panel{max-height:48vh;padding:5px 12px 7px}
  .cap-info{gap:7px}
  .itop{margin-bottom:3px}
  .stats{gap:1px 5px}
  .strack{height:7px}
  .actions{margin-top:5px;gap:5px}
  .btn-act{padding:5px 8px;min-width:46px}
  .btn-act svg{width:20px;height:20px}
  .btn-act span{font-size:.58rem}
  .av{width:50px;height:46px}
  .ph{padding:8px 0}
}
</style>
</head>
<body>

<!-- INTRO -->
<div class="intro" id="intro">
  <div class="icard">
    <div style="margin-bottom:10px">
      <svg width="80" height="60" viewBox="0 0 100 70">
        <ellipse cx="50" cy="52" rx="32" ry="22" fill="#b8975a"/>
        <ellipse cx="50" cy="46" rx="30" ry="20" fill="#c8a86a"/>
        <ellipse cx="50" cy="42" rx="26" ry="16" fill="#d4b87a"/>
        <circle cx="30" cy="30" r="14" fill="#c8a86a"/>
        <circle cx="70" cy="30" r="14" fill="#c8a86a"/>
        <ellipse cx="30" cy="26" rx="10" ry="9" fill="#d4b87a"/>
        <ellipse cx="70" cy="26" rx="10" ry="9" fill="#d4b87a"/>
        <ellipse cx="27" cy="22" rx="5" ry="5" fill="#a07040"/>
        <ellipse cx="73" cy="22" rx="5" ry="5" fill="#a07040"/>
        <ellipse cx="27" cy="22" rx="2.5" ry="2.5" fill="#2a1800"/>
        <ellipse cx="73" cy="22" rx="2.5" ry="2.5" fill="#2a1800"/>
        <ellipse cx="28.5" cy="21.5" rx="1" ry="1" fill="white" opacity=".7"/>
        <ellipse cx="74.5" cy="21.5" rx="1" ry="1" fill="white" opacity=".7"/>
        <ellipse cx="50" cy="38" rx="9" ry="6" fill="#b89060"/>
        <ellipse cx="45" cy="39" rx="3" ry="2" fill="#2a1800"/>
        <ellipse cx="55" cy="39" rx="3" ry="2" fill="#2a1800"/>
        <path d="M45 43 Q50 46 55 43" stroke="#7a5030" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <ellipse cx="50" cy="48" rx="4" ry="2.5" fill="#c89070" opacity=".7"/>
        <!-- Blush -->
        <ellipse cx="36" cy="42" rx="5" ry="3" fill="#ff9aaa" opacity=".5"/>
        <ellipse cx="64" cy="42" rx="5" ry="3" fill="#ff9aaa" opacity=".5"/>
        <!-- Ears -->
        <ellipse cx="22" cy="17" rx="5" ry="6" fill="#c8a86a"/>
        <ellipse cx="78" cy="17" rx="5" ry="6" fill="#c8a86a"/>
        <ellipse cx="22" cy="17" rx="3" ry="4" fill="#e8c090"/>
        <ellipse cx="78" cy="17" rx="3" ry="4" fill="#e8c090"/>
        <!-- Feet -->
        <ellipse cx="30" cy="66" rx="10" ry="6" fill="#b89060"/>
        <ellipse cx="70" cy="66" rx="10" ry="6" fill="#b89060"/>
      </svg>
    </div>
    <h1>Capivarinhas</h1>
    <p>Cuide das suas capivarinhas fofas!<br>Alimente, dê banho, brinque e muito mais.</p>
    <button class="ibtn" onclick="startGame()">Entrar no campo!</button>
  </div>
</div>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-title">
    <svg width="24" height="24" viewBox="0 0 50 50">
      <ellipse cx="25" cy="32" rx="14" ry="12" fill="rgba(255,255,255,.9)"/>
      <circle cx="13" cy="17" r="6" fill="rgba(255,255,255,.9)"/>
      <circle cx="25" cy="14" r="6" fill="rgba(255,255,255,.9)"/>
      <circle cx="37" cy="17" r="6" fill="rgba(255,255,255,.9)"/>
    </svg>
    Capivarinhas
  </div>
  <div style="display:flex;gap:7px">
    <button class="btn-add" style="background:#4a9ad4;color:white" onclick="window.location.href='mapa.html'">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="white" stroke-width="1.5"/><path d="M5 8Q6 5 8 4Q10 5 11 8Q10 11 8 12Q6 11 5 8Z" stroke="white" stroke-width="1.2" fill="none"/><line x1="1.5" y1="8" x2="14.5" y2="8" stroke="white" stroke-width="1.2"/></svg>
      Mapa 3D, aperta aquiiiii
    </button>
    <button class="btn-add" onclick="addCapybara()">
      <svg width="12" height="12" viewBox="0 0 14 14"><line x1="7" y1="1" x2="7" y2="13" stroke="#5a3e00" stroke-width="2.5" stroke-linecap="round"/><line x1="1" y1="7" x2="13" y2="7" stroke="#5a3e00" stroke-width="2.5" stroke-linecap="round"/></svg>
      Nova
    </button>
  </div>
</div>

<!-- SCENE -->
<div class="scene" id="scene">
  <!-- Sun -->
  <svg class="deco" style="top:10px;right:20px" width="48" height="48" viewBox="0 0 48 48">
    <circle cx="24" cy="24" r="12" fill="#FFD700"/>
    <line x1="24" y1="2" x2="24" y2="8" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="24" y1="40" x2="24" y2="46" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="2" y1="24" x2="8" y2="24" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="40" y1="24" x2="46" y2="24" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="7" y1="7" x2="11.5" y2="11.5" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
    <line x1="36.5" y1="36.5" x2="41" y2="41" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
    <line x1="41" y1="7" x2="36.5" y2="11.5" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
    <line x1="7" y1="41" x2="11.5" y2="36.5" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
    <circle cx="20" cy="20" r="3" fill="white" opacity=".25"/>
  </svg>

  <!-- Clouds -->
  <svg class="deco cloud" style="top:14px;animation-duration:35s;animation-delay:-5s" width="110" height="46" viewBox="0 0 110 46">
    <ellipse cx="55" cy="33" rx="44" ry="15" fill="white" opacity=".92"/>
    <ellipse cx="38" cy="23" rx="24" ry="19" fill="white" opacity=".92"/>
    <ellipse cx="66" cy="21" rx="21" ry="16" fill="white" opacity=".92"/>
    <ellipse cx="85" cy="29" rx="18" ry="13" fill="white" opacity=".92"/>
  </svg>
  <svg class="deco cloud" style="top:52px;animation-duration:55s;animation-delay:-24s" width="80" height="36" viewBox="0 0 80 36">
    <ellipse cx="40" cy="27" rx="32" ry="12" fill="white" opacity=".8"/>
    <ellipse cx="27" cy="18" rx="18" ry="14" fill="white" opacity=".8"/>
    <ellipse cx="55" cy="17" rx="16" ry="13" fill="white" opacity=".8"/>
  </svg>

  <!-- Pond -->
  <svg class="deco" style="bottom:65px;left:6px" width="128" height="56" viewBox="0 0 128 56">
    <ellipse cx="64" cy="36" rx="60" ry="22" fill="#52aed0" opacity=".8"/>
    <ellipse cx="58" cy="30" rx="28" ry="10" fill="white" opacity=".2"/>
    <path d="M16 32 Q36 26 54 32" stroke="white" stroke-width="1.5" fill="none" opacity=".45"/>
    <path d="M38 40 Q56 35 72 40" stroke="white" stroke-width="1.2" fill="none" opacity=".35"/>
    <!-- Lily pads -->
    <ellipse cx="28" cy="40" rx="9" ry="5.5" fill="#4a9442"/>
    <circle cx="28" cy="37" r="3.2" fill="#ffb5c8"/>
    <ellipse cx="90" cy="44" rx="7.5" ry="4.5" fill="#4a9442"/>
    <circle cx="90" cy="41" r="2.8" fill="#ffccdd"/>
    <text x="64" y="54" text-anchor="middle" font-size="8" fill="#2a7090" font-family="Nunito" font-weight="800" opacity=".7">praia das capivaras</text>
  </svg>

  <!-- House -->
  <svg class="deco" style="bottom:64px;right:8px" width="110" height="112" viewBox="0 0 110 112">
    <ellipse cx="55" cy="110" rx="46" ry="5" fill="rgba(0,0,0,.13)"/>
    <rect x="12" y="56" width="86" height="56" rx="4" fill="#c88a5c"/>
    <!-- Wood planks -->
    <line x1="12" y1="68" x2="98" y2="68" stroke="#a06838" stroke-width=".8" opacity=".4"/>
    <line x1="12" y1="80" x2="98" y2="80" stroke="#a06838" stroke-width=".8" opacity=".4"/>
    <line x1="12" y1="92" x2="98" y2="92" stroke="#a06838" stroke-width=".8" opacity=".4"/>
    <!-- Roof -->
    <polygon points="3,58 55,11 107,58" fill="#c0392b"/>
    <line x1="8" y1="56" x2="55" y2="14" stroke="white" stroke-width="1.5" opacity=".2"/>
    <!-- Chimney -->
    <rect x="69" y="17" width="13" height="24" rx="2" fill="#a04828"/>
    <rect x="67" y="15" width="17" height="5" rx="2" fill="#8a3818"/>
    <!-- Door -->
    <rect x="37" y="74" width="22" height="38" rx="4" fill="#6a3808"/>
    <circle cx="57" cy="94" r="2.5" fill="#f5c842"/>
    <!-- Window -->
    <rect x="66" y="62" width="22" height="18" rx="3" fill="#b5e8f8"/>
    <line x1="77" y1="62" x2="77" y2="80" stroke="#c88a5c" stroke-width="1.5"/>
    <line x1="66" y1="71" x2="88" y2="71" stroke="#c88a5c" stroke-width="1.5"/>
    <rect x="68" y="63" width="4" height="5" rx="1" fill="white" opacity=".5"/>
    <!-- Sign -->
    <rect x="28" y="57" width="44" height="13" rx="3" fill="#f5c842"/>
    <text x="50" y="67" text-anchor="middle" font-size="7.5" fill="#5a3e00" font-family="Nunito" font-weight="900">casinha</text>
  </svg>

  <!-- Tree left -->
  <svg class="deco" style="bottom:65px;right:130px" width="50" height="80" viewBox="0 0 50 80">
    <rect x="22" y="55" width="6" height="25" rx="3" fill="#6a4a00"/>
    <ellipse cx="25" cy="36" rx="23" ry="29" fill="#3a7025"/>
    <ellipse cx="20" cy="28" rx="10" ry="13" fill="#5aaa42" opacity=".55"/>
  </svg>

  <!-- Grass tufts -->
  <svg class="deco" style="left:37%;bottom:62px" width="40" height="28" viewBox="0 0 40 28">
    <path d="M3,28 Q3,7 6,1 Q9,8 7,28" fill="#3a7025"/>
    <path d="M10,28 Q12,4 16,0 Q19,7 16,28" fill="#4a9442"/>
    <path d="M18,28 Q21,6 24,3 Q26,9 23,28" fill="#3a7025"/>
    <path d="M27,28 Q29,9 32,5 Q34,12 32,28" fill="#4a9442"/>

      <ellipse cx="53" cy="62" rx="9" ry="5.5" fill="${cd}"/>
      <ellipse cx="60" cy="60" rx="9.5" ry="6.5" fill="${cd}"/>
      <!-- Toe lines -->
      <line x1="18" y1="63" x2="26" y2="63" stroke="${shadeColor(cd,-15)}" stroke-width="1" opacity=".6"/>
      <line x1="33" y1="65" x2="41" y2="65" stroke="${shadeColor(cd,-15)}" stroke-width="1" opacity=".6"/>
      <line x1="49" y1="65" x2="57" y2="65" stroke="${shadeColor(cd,-15)}" stroke-width="1" opacity=".6"/>

function shadeColor(col, amt) {
  let r = parseInt(col.slice(1,3),16);
  let g = parseInt(col.slice(3,5),16);
  let b = parseInt(col.slice(5,7),16);
  r = Math.min(255,Math.max(0,r+amt));
  g = Math.min(255,Math.max(0,g+amt));
  b = Math.min(255,Math.max(0,b+amt));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// ─── GAME STATE ──────────────────────────────────────────────────────────────
const COLORS = ['#c8a86a','#b89058','#d4b87a','#a88050','#c0b880'];
let caps = [];
let sel = null;
let moveTimer = null;
let decayTimer = null;

function defaultCap(id, isAdult, name, color) {
  return {
    id,
    name: name || (isAdult ? 'Capivara' : 'Filhotinho'),
    isAdult,
    color: color || COLORS[Math.floor(Math.random()*COLORS.length)],
    hunger: 80,
    joy: 80,
    clean: 80,
    energy: 80,
    state: 'idle',
    x: 20 + Math.random() * 60,
    flipped: Math.random() > 0.5,
  };
}

function save() {
  localStorage.setItem('capivarinhas_v4', JSON.stringify(caps));
}

function load() {
  try {
    const d = JSON.parse(localStorage.getItem('capivarinhas_v4'));
    if (d && d.length) {
      caps = d;
      caps.forEach(c => { c.state = 'idle'; });
      return true;
    }
  } catch(e) {}
  return false;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function getSceneW() { return document.getElementById('scene').clientWidth; }
function getSceneH() { return document.getElementById('scene').clientHeight; }

function renderAll() {
  const scene = document.getElementById('scene');
  // Remove existing caps
  document.querySelectorAll('.cap-wrap').forEach(e => e.remove());
  caps.forEach(c => createCapEl(c));
}

function createCapEl(c) {
  const scene = document.getElementById('scene');
  const W = c.isAdult ? 82 : 58;
  const div = document.createElement('div');
  div.className = 'cap-wrap st-' + c.state + (c.flipped ? ' flipped' : '') + (sel === c.id ? ' sel' : '');
  div.id = 'cap-' + c.id;
  div.style.left = calcLeft(c) + 'px';
  div.style.bottom = c.isAdult ? '68px' : '66px';

  div.innerHTML = buildCapySVG(c.isAdult, c.color);

  // Name tag
  const tag = document.createElement('div');
  tag.className = 'cap-name-tag';
  tag.textContent = c.name;
  div.appendChild(tag);

  // Alert dot
  const alert = document.createElement('div');
  alert.className = 'cap-alert' + (needsHelp(c) ? ' on' : '');
  div.appendChild(alert);

  // Zzz
  if (c.state === 'sleeping') {
    const zzz = document.createElement('div');
    zzz.className = 'zzz';
    zzz.innerHTML = `<svg width="24" height="22" viewBox="0 0 24 22" fill="none">
      <text x="0" y="10" font-family="Fredoka One" font-size="9" fill="#7a6a50">z</text>
      <text x="6" y="18" font-family="Fredoka One" font-size="11" fill="#7a6a50">z</text>
      <text x="14" y="22" font-family="Fredoka One" font-size="8" fill="#7a6a50">z</text>
    </svg>`;
    div.appendChild(zzz);
  }

  div.addEventListener('click', () => selectCap(c.id));
  scene.appendChild(div);
}

function calcLeft(c) {
  const sw = getSceneW();
  const W = c.isAdult ? 82 : 58;
  return Math.max(4, Math.min(sw - W - 4, (c.x / 100) * sw));
}

function needsHelp(c) {
  return c.hunger < 25 || c.joy < 25 || c.clean < 25 || c.energy < 15;
}

function updateCapEl(c) {
  const el = document.getElementById('cap-' + c.id);
  if (!el) return;
  // State
  el.className = 'cap-wrap st-' + c.state + (c.flipped ? ' flipped' : '') + (sel === c.id ? ' sel' : '');
  el.style.left = calcLeft(c) + 'px';
  el.style.bottom = c.isAdult ? '68px' : '66px';

  // Update SVG
  const existing = el.querySelector('svg.cap-svg');
  if (existing) existing.remove();
  const tmp = document.createElement('div');
  tmp.innerHTML = buildCapySVG(c.isAdult, c.color);
  const svgEl = tmp.firstElementChild;
  el.insertBefore(svgEl, el.firstChild);

  // Update name tag
  const tag = el.querySelector('.cap-name-tag');
  if (tag) tag.textContent = c.name;

  // Alert
  const alert = el.querySelector('.cap-alert');
  if (alert) alert.classList.toggle('on', needsHelp(c));

  // Zzz
  const existingZzz = el.querySelector('.zzz');
  if (existingZzz) existingZzz.remove();
  if (c.state === 'sleeping') {
    const zzz = document.createElement('div');
    zzz.className = 'zzz';
    zzz.innerHTML = `<svg width="24" height="22" viewBox="0 0 24 22" fill="none">
      <text x="0" y="10" font-family="Fredoka One" font-size="9" fill="#7a6a50">z</text>
      <text x="6" y="18" font-family="Fredoka One" font-size="11" fill="#7a6a50">z</text>
      <text x="14" y="22" font-family="Fredoka One" font-size="8" fill="#7a6a50">z</text>
    </svg>`;
    el.appendChild(zzz);
  }
}

function updatePanel() {
  const ph = document.getElementById('ph');
  const ci = document.getElementById('ci');
  const acts = document.getElementById('acts');
  if (!sel) {
    ph.style.display = '';
    ci.style.display = 'none';
    acts.style.display = 'none';
    return;
  }
  const c = caps.find(x => x.id === sel);
  if (!c) return;
  ph.style.display = 'none';
  ci.style.display = 'flex';
  acts.style.display = 'flex';

  // Avatar
  const av = document.getElementById('av');
  av.innerHTML = buildCapySVG(c.isAdult, c.color);
  const avSvg = av.querySelector('svg');
  if (avSvg) { avSvg.setAttribute('width','54'); avSvg.setAttribute('height','50'); }

  document.getElementById('inm').textContent = c.name;
  document.getElementById('ibadge').textContent = c.isAdult ? 'adulta' : 'filhote';

  document.getElementById('bH').style.width = c.hunger + '%';
  document.getElementById('bJ').style.width = c.joy + '%';
  document.getElementById('bC').style.width = c.clean + '%';
  document.getElementById('bE').style.width = c.energy + '%';
}

// ─── SELECTION ───────────────────────────────────────────────────────────────
function selectCap(id) {
  sel = id;
  document.querySelectorAll('.cap-wrap').forEach(el => {
    el.classList.toggle('sel', el.id === 'cap-' + id);
  });
  updatePanel();
}

function getSelected() {
  return caps.find(c => c.id === sel);
}

// ─── ACTIONS ────────────────────────────────────────────────────────────────
function doAction(act) {
  const c = getSelected();
  if (!c) return;
  if (c.state === 'sleeping' && act !== 'sleep') {
    c.state = 'idle';
    updateCapEl(c);
  }
  if (act === 'feed') { openFood(); return; }
  if (act === 'bath') {
    c.clean = Math.min(100, c.clean + 40);
    c.joy = Math.min(100, c.joy + 10);
    setState(c, 'bathing', 2000, 'happy');
    spawnFX(c, 'bath');
    showToast(c.name + ' está tomando banho!');
  }
  if (act === 'play') {
    if (c.energy < 15) { showToast(c.name + ' está cansada demais!'); return; }
    c.joy = Math.min(100, c.joy + 35);
    c.energy = Math.max(0, c.energy - 18);
    setState(c, 'playing', 2200, 'happy');
    spawnFX(c, 'play');
    showToast(c.name + ' está brincando!');
  }
  if (act === 'sleep') {
    c.state = c.state === 'sleeping' ? 'idle' : 'sleeping';
    updateCapEl(c);
    showToast(c.state === 'sleeping' ? c.name + ' foi dormir!' : c.name + ' acordou!');
  }
  if (act === 'pet') {
    c.joy = Math.min(100, c.joy + 20);
    setState(c, 'pet', 1400, 'happy');
    spawnFX(c, 'pet');
    showToast(c.name + ' adorou o carinho!');
  }
  save();
  updatePanel();
}

function setState(c, st, dur, after) {
  c.state = st;
  updateCapEl(c);
  clearTimeout(c._stTimer);
  c._stTimer = setTimeout(() => {
    c.state = after || 'idle';
    updateCapEl(c);
  }, dur);
}

// ─── FOOD ────────────────────────────────────────────────────────────────────
function openFood() {
  const fov = document.getElementById('fov');
  const grid = document.getElementById('fgrid');
  grid.innerHTML = '';
  FOODS.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'btn-food';
    btn.innerHTML = (FOOD_SVG[f.id] || '') + `<span>${f.name}</span>`;
    btn.onclick = () => feedFood(f);
    grid.appendChild(btn);
  });
  fov.classList.add('on');
}

function closeFood() {
  document.getElementById('fov').classList.remove('on');
}

function closeFoodIfOutside(e) {
  if (e.target === document.getElementById('fov')) closeFood();
}

function feedFood(f) {
  const c = getSelected();
  if (!c) return;
  closeFood();
  c.hunger = Math.min(100, c.hunger + 35);
  c.joy = Math.min(100, c.joy + 8);
  setState(c, 'eating', 1800, 'happy');
  spawnFX(c, 'food', f);
  showToast(c.name + ' comeu ' + f.name + '!');
  save();
  updatePanel();
}

// ─── FX ──────────────────────────────────────────────────────────────────────
function spawnFX(c, type, foodData) {
  const el = document.getElementById('cap-' + c.id);
  if (!el) return;
  const rect = el.getBoundingClientRect();
  const scene = document.getElementById('scene');
  const srect = scene.getBoundingClientRect();

  const fx = document.createElement('div');
  fx.className = 'float-fx';
  const x = rect.left - srect.left + rect.width / 2 - 18;
  const y = rect.top - srect.top - 10;
  fx.style.left = x + 'px';
  fx.style.top = y + 'px';

  if (type === 'food' && foodData) {
    fx.innerHTML = FOOD_SVG[foodData.id] || '';
    fx.style.width = '36px';
  } else if (type === 'bath') {
    fx.innerHTML = `<svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <path d="M18 2Q22 8 22 12Q22 17 18 19Q14 17 14 12Q14 8 18 2Z" fill="#72d4f0"/>
      <path d="M8 12Q10 16 9 19Q7 17 8 12Z" fill="#1aadde"/>
      <path d="M28 12Q30 16 29 19Q27 17 28 12Z" fill="#1aadde"/>
    </svg>`;
  } else if (type === 'play') {
    fx.innerHTML = `<svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <path d="M18 4L21 14H32L23 20L26 30L18 24L10 30L13 20L4 14H15Z" fill="#f5c842"/>
    </svg>`;
  } else if (type === 'pet') {
    fx.innerHTML = `<svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <path d="M18 30L5 17Q3 9 11 9Q15 9 18 14Q21 9 25 9Q33 9 31 17Z" fill="#ff6080"/>
    </svg>`;
  }

  scene.appendChild(fx);
  setTimeout(() => fx.remove(), 2000);
}

// ─── RENAME ──────────────────────────────────────────────────────────────────
function openRename() {
  const c = getSelected();
  if (!c) return;
  document.getElementById('rinp').value = c.name;
  document.getElementById('rov').classList.add('on');
  setTimeout(() => document.getElementById('rinp').focus(), 280);
}

function closeRename() {
  document.getElementById('rov').classList.remove('on');
}

function confirmRename() {
  const c = getSelected();
  if (!c) return;
  const v = document.getElementById('rinp').value.trim();
  if (v) {
    c.name = v;
    updateCapEl(c);
    updatePanel();
    save();
    showToast('Nome alterado para ' + v + '!');
  }
  closeRename();
}

document.getElementById('rinp').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmRename();
  if (e.key === 'Escape') closeRename();
});

// ─── ADD CAPYBARA ────────────────────────────────────────────────────────────
function addCapybara() {
  if (caps.length >= 6) { showToast('Máximo de 6 capivarinhas!'); return; }
  const isAdult = caps.filter(c => c.isAdult).length < 2;
  const names = ['Capivinha','Gordinha','Bolinha','Fofinha','Branquinha','Pretinha','Manchinha'];
  const n = names[Math.floor(Math.random()*names.length)];
  const col = COLORS[caps.length % COLORS.length];
  const c = defaultCap(Date.now(), isAdult, n, col);
  c.x = 15 + Math.random() * 70;
  caps.push(c);
  createCapEl(c);
  selectCap(c.id);
  save();
  showToast('Nova capivara: ' + n + '!');
}

// ─── DECAY ───────────────────────────────────────────────────────────────────
function decayLoop() {
  caps.forEach(c => {
    if (c.state === 'sleeping') {
      c.energy = Math.min(100, c.energy + 1.2);
      c.hunger = Math.max(0, c.hunger - 0.3);
      return;
    }
    c.hunger = Math.max(0, c.hunger - 0.7);
    c.joy = Math.max(0, c.joy - 0.5);
    c.clean = Math.max(0, c.clean - 0.35);
    c.energy = Math.max(0, c.energy - 0.55);
    if (c.energy <= 0 && c.state !== 'sleeping') {
      c.state = 'sleeping';
      showToast(c.name + ' caiu de sono!');
    }
    const el = document.getElementById('cap-' + c.id);
    if (el) {
      const alert = el.querySelector('.cap-alert');
      if (alert) alert.classList.toggle('on', needsHelp(c));
    }
  });
  if (sel) updatePanel();
  save();
}

// ─── WANDER ──────────────────────────────────────────────────────────────────
function wanderLoop() {
  caps.forEach(c => {
    if (c.state === 'sleeping' || c.state === 'eating' || c.state === 'bathing' || c.state === 'playing') return;
    if (Math.random() < 0.35) {
      const nx = 5 + Math.random() * 90;
      c.flipped = nx < c.x;
      c.x = nx;
      c.state = 'idle';
      updateCapEl(c);
    }
  });
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
let toastT = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('on'), 2300);
}

// ─── FOOD MODAL BUILD ────────────────────────────────────────────────────────
// ─── INIT ────────────────────────────────────────────────────────────────────
function startGame() {
  document.getElementById('intro').classList.add('hide');
  setTimeout(() => document.getElementById('intro').remove(), 700);
}

function init() {
  // Skip intro if coming from map
  if (document.referrer.includes('mapa.html') || sessionStorage.getItem('skipIntro')) {
    startGame();
  }
  sessionStorage.setItem('skipIntro', '1');
  if (!load()) {
    // Default: 1 adult + 1 baby
    caps.push(defaultCap(1, true, 'Capivona', COLORS[0]));
    caps.push(defaultCap(2, false, 'Filhotinho', COLORS[1]));
    caps[0].x = 30;
    caps[1].x = 65;
  }
  renderAll();
  updatePanel();

  setInterval(decayLoop, 3000);
  setInterval(wanderLoop, 4500);
  // Auto-select first cap
  if (caps.length > 0) selectCap(caps[0].id);
}

init();
</script>
